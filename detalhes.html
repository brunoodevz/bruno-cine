<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrunoCine — Detalhes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <a class="logo" href="index.html">BrunoCine</a>
        <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="Buscar...">
        </div>
    </nav>

    <div class="search-results" id="search-results"></div>

    <!-- CONTEÚDO PRINCIPAL DA PÁGINA DE DETALHES -->
    <!-- NÃO mude id="detalhes-wrap" — o JS cria TODO o conteúdo aqui dentro -->
    <!-- Você não coloca nada dentro dessa div manualmente -->
    <!-- Para mudar o layout dos detalhes, edite o detalhes.js na função montarDetalhes() -->
    <div id="detalhes-wrap">
        <p class="carregando" style="text-align:center; padding: 5rem;">Carregando...</p>
    </div>

    <footer>
        <p>BrunoCine &copy; <span id="ano-atual"></span> — Dados: <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/detalhes.js"></script>

</body>

</html>
