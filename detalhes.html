<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrunoCine — Detalhes</title>
    <link rel="stylesheet" href="style.css">

    <style>

        nav {
            margin-bottom: 10px;
        }
        /* BOTÃO VOLTAR */
        .btn-voltar {
            display: inline-block;
            margin-bottom: 2rem;
            text-decoration: none;
            color: #fff;
            background: #222;
            padding: 0.5rem 1rem;
            border-radius: 6px;
        }

        /* GRID PRINCIPAL */
        .detalhe-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        /* POSTER */
        .detalhe-poster {
            width: 100%;
            border-radius: 10px;
        }

        /* INFO */
        .detalhe-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .detalhe-titulo {
            font-size: 2rem;
        }

        .detalhe-tagline {
            font-style: italic;
            color: #aaa;
        }

        .detalhe-meta {
            display: flex;
            gap: 1rem;
            color: #ccc;
        }

        .detalhe-generos {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .genero {
            background: #222;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .detalhe-overview {
            line-height: 1.6;
            color: #ddd;
        }

        /* SEÇÕES */
        .detalhe-secao {
            margin-top: 3rem;
        }

        .detalhe-secao h2 {
            margin-bottom: 1rem;
        }

        /* ELENCO */
        .elenco-lista {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
        }

        .ator-card {
            width: 100px;
            text-align: center;
        }

        .ator-card img {
            width: 100%;
            border-radius: 50%;
        }

        .ator-nome {
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        .ator-personagem {
            font-size: 0.7rem;
            color: #aaa;
        }

        /* CARDS SIMILARES */
        .cards-row {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
        }

        .card {
            min-width: 150px;
            text-decoration: none;
            color: white;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        /* LOADING */
        .carregando {
            color: #aaa;
        }

        /* FOOTER */
        footer {
            margin-top: 4rem;
            padding: 2rem;
            text-align: center;
            background: #15151d;
            color: #aaa;
        }

        footer a {
            color: #e50914;
            text-decoration: none;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .detalhe-grid {
                grid-template-columns: 1fr;
            }

            .detalhe-poster {
                max-width: 200px;
                margin: auto;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a class="logo" href="index.html">BrunoCine</a>
        <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="Buscar...">
        </div>
    </nav>

    <div class="search-results" id="search-results"></div>

    <!-- CONTEÚDO PRINCIPAL DA PÁGINA DE DETALHES -->
    <!-- NÃO mude id="detalhes-wrap" — o JS cria TODO o conteúdo aqui dentro -->
    <!-- Você não coloca nada dentro dessa div manualmente -->
    <!-- Para mudar o layout dos detalhes, edite o detalhes.js na função montarDetalhes() -->
    <div id="detalhes-wrap">
        <p class="carregando" style="text-align:center; padding: 5rem;">Carregando...</p>
    </div>

    <footer>
        <p>BrunoCine &copy; <span id="ano-atual"></span> — Dados: <a href="https://www.themoviedb.org"
                target="_blank">TMDB</a></p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/detalhes.js"></script>

</body>

</html>
